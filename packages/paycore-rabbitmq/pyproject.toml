[project]
name = "paycore-rabbitmq"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = ["paycore-domain>=1.0.0", "pika>=1.3.0"]

[project.urls]
Repository = "https://github.com/UsePaycore/paycore-shared"

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
